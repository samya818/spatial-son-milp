name: SON Dashboard CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        pip install -r requirements-dashboard.txt
        
    - name: Lint with ruff
      run: ruff check scripts/dashboard
      
    - name: Run unit tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        pytest tests/unit/test_dashboard_logic.py

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t son-dashboard:latest .
